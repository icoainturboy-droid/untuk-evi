<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Untuk Evi 🖤</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#fff;
  font-family:Poppins,sans-serif;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,0,80,.12),transparent 30%),
    radial-gradient(circle at 80% 70%,rgba(150,0,80,.1),transparent 30%);
  pointer-events:none;
  z-index:-2;
}

#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:10;
}

.particle{
  position:absolute;
  color:#ff3b7d;
  animation:fall linear infinite;
  opacity:.7;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
    opacity:0;
  }
  15%{opacity:1}
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

section{
  min-height:100vh;
  padding:90px 22px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.container{
  max-width:900px;
  width:100%;
}

h1,h2,h3{
  font-family:"Cormorant Garamond",serif;
}
