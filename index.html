<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Evi 🤍</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffe4ec, #fff7f9);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow-x: hidden;
}

.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.9);
  border-radius: 28px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.12);
  animation: muncul 1s ease;
}

h1 {
  color: #ff5c8a;
  font-size: 30px;
  margin-bottom: 10px;
}

p {
  color: #555;
  line-height: 1.7;
  font-size: 16px;
}

.heart {
  font-size: 70px;
  animation: detak 1.2s infinite;
  margin: 15px;
}

button {
  border: none;
  background: #ff6f9c;
  color: white;
  padding: 14px 25px;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 15px;
  box-shadow: 0 8px 20px rgba(255,111,156,0.35);
}

button:active {
  transform: scale(0.95);
}

#pesan {
  display: none;
  margin-top: 20px;
  background: #fff0f5;
  padding: 18px;
  border-radius: 18px;
  color: #555;
}

@keyframes detak {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

@keyframes muncul {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.floating {
  position: fixed;
  font-size: 24px;
  animation: jatuh 6s linear infinite;
  top: -40px;
}

@keyframes jatuh {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="floating" style="left:10%; animation-delay:0s;">🤍</div>
<div class="floating" style="left:30%; animation-delay:2s;">💗</div>
<div class="floating" style="left:60%; animation-delay:1s;">✨</div>
<div class="floating" style="left:85%; animation-delay:3s;">💕</div>

<div class="card">
  <div class="heart">🤍</div>

  <h1>Untuk Evi</h1>

  <p>
    Hai Evi 🤍<br><br>
    Aku cuma mau bilang sesuatu yang mungkin sederhana,
    tapi benar-benar datang dari hati.
  </p>

  <button onclick="tampilkanPesan()">
    Klik di sini 💌
  </button>

  <div id="pesan">
    Aku senang bisa mengenal kamu.
    Aku nggak tahu akan jadi apa semuanya nanti,
    tapi untuk sekarang...
    aku cuma ingin kamu tahu kalau kamu itu spesial buat aku 🤍
  </div>
</div>

<script>
function tampilkanPesan() {
  document.getElementById("pesan").style.display = "block";
}
</script>

</body>
</html>
