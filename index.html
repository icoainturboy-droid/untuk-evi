<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Evi 🤍</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:Arial,sans-serif;
    overflow:hidden;
    background:#080b16;
    color:white;
}

.page{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:25px;
    text-align:center;
    overflow:hidden;
}

.page.active{
    display:flex;
    animation:pageIn .8s ease;
}

@keyframes pageIn{
    from{opacity:0;transform:scale(1.08)}
    to{opacity:1;transform:scale(1)}
}

/* BACKGROUND */
.stars{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;transform:scale(.5)}
    to{opacity:1;transform:scale(1.5)}
}

.orb{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(70px);
    opacity:.4;
    animation:float 8s infinite alternate ease-in-out;
}

.orb.one{background:#ff4f91;top:-100px;left:-100px}
.orb.two{background:#7c5cff;bottom:-100px;right:-100px;animation-delay:2s}

@keyframes float{
    to{transform:translate(80px,50px) scale(1.3)}
}

/* CONTENT */
.content{
    width:100%;
    max-width:600px;
    position:relative;
    z-index:2;
}

h1{
    font-size:clamp(38px,10vw,75px);
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #ff6b9d}
    to{text-shadow:0 0 35px #ff6b9d,0 0 60px #ff6b9d}
}

h2{
    font-size:clamp(28px,7vw,50px);
    margin-bottom:20px;
}

p{
    font-size:18px;
    line-height:1.7;
    color:#ddd;
    margin-bottom:25px;
}

button{
    border:0;
    padding:15px 28px;
    border-radius:999px;
    background:linear-gradient(135deg,#ff4f91,#9d5cff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 25px #ff4f9166;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px #ff4f91;
}

/* HEART */
.big-heart{
    font-size:110px;
    animation:heartbeat 1.2s infinite;
    margin-bottom:20px;
}

@keyframes heartbeat{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.25)}
}

/* LETTER */
.letter{
    background:#ffffff12;
    border:1px solid #ffffff30;
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 40px #0008;
    animation:letterFloat 4s infinite alternate ease-in-out;
}

@keyframes letterFloat{
    to{transform:translateY(-10px) rotate(1deg)}
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    padding:25px 15px;
    border-radius:20px;
    background:#ffffff12;
    border:1px solid #ffffff25;
    backdrop-filter:blur(10px);
    transition:.4s;
}

.card:hover{
    transform:translateY(-12px) rotate(2deg);
    background:#ff4f9130;
}

.card .emoji{
    font-size:45
